name: Test

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    # Only run on push to main, or when the `ready` label is applied to a PR.
    # We intentionally omit `synchronize` from the trigger types: an unlabeled
    # PR would otherwise run this workflow, the `if` would evaluate false, and
    # GitHub would report the required check as "skipped" (which counts as
    # passing). Restricting triggers means the required check stays pending
    # until the label is applied. To re-run tests after new commits, remove
    # and re-add the `ready` label.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'ready')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
